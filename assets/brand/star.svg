<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="North Star Intelligence mark">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F3F5"/>
      <stop offset="0.45" stop-color="#C7CBD3"/>
      <stop offset="0.55" stop-color="#8F97A6"/>
      <stop offset="1" stop-color="#E6E8EC"/>
    </linearGradient>
    <linearGradient id="chromeDark" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AEB4BF"/>
      <stop offset="1" stop-color="#5E6675"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#6EA4FF"/>
      <stop offset="1" stop-color="#1E6BFF"/>
    </radialGradient>
  </defs>
  <!-- Four-point star: each point split into light/dark facet for the chrome bevel -->
  <g>
    <!-- North -->
    <path d="M60 2 L66 48 L60 54 Z" fill="url(#chrome)"/>
    <path d="M60 2 L54 48 L60 54 Z" fill="url(#chromeDark)"/>
    <!-- East -->
    <path d="M118 60 L72 66 L66 60 Z" fill="url(#chrome)"/>
    <path d="M118 60 L72 54 L66 60 Z" fill="url(#chromeDark)"/>
    <!-- South -->
    <path d="M60 118 L54 72 L60 66 Z" fill="url(#chrome)"/>
    <path d="M60 118 L66 72 L60 66 Z" fill="url(#chromeDark)"/>
    <!-- West -->
    <path d="M2 60 L48 54 L54 60 Z" fill="url(#chrome)"/>
    <path d="M2 60 L48 66 L54 60 Z" fill="url(#chromeDark)"/>
  </g>
  <!-- Square core -->
  <rect x="52" y="52" width="16" height="16" fill="none" stroke="url(#chrome)" stroke-width="2.4"/>
  <rect x="56" y="56" width="8" height="8" fill="url(#core)"/>
</svg>
